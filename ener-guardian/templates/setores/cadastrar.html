{% extends "base.html" %}
{% block title %}{{ 'Editar' if editando else 'Novo' }} Setor — Ener-Guardian{% endblock %}
{% block content %}
<div class="mb-6">
    <a href="{{ url_for('setores.listar') }}" class="text-on-surface-variant font-body-sm hover:text-primary-container flex items-center gap-1 mb-4">
        <span class="material-symbols-outlined text-[16px]">arrow_back</span> Voltar
    </a>
    <h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface">
        {{ 'Editar Setor' if editando else 'Novo Setor' }}
    </h2>
</div>
<div class="bg-surface border border-[#E2E8F0] rounded tech-shadow p-6 max-w-xl">
    <form method="POST">
        <div class="flex flex-col gap-5">
            <div>
                <label class="block font-label-caps text-label-caps text-tertiary uppercase mb-2">Nome do Setor</label>
                <input type="text" name="nome" required value="{{ setor.nome if editando else '' }}" placeholder="Ex: Produção"
                    class="w-full px-4 py-2 bg-surface-container-lowest border border-outline-variant rounded font-body-md focus:border-primary-container focus:ring-1 focus:ring-primary-container focus:outline-none"/>
            </div>
            <div>
                <label class="block font-label-caps text-label-caps text-tertiary uppercase mb-2">Descrição</label>
                <textarea name="descricao" rows="2" placeholder="Descrição do setor..."
                    class="w-full px-4 py-2 bg-surface-container-lowest border border-outline-variant rounded font-body-md focus:border-primary-container focus:ring-1 focus:ring-primary-container focus:outline-none resize-none">{{ setor.descricao if editando else '' }}</textarea>
            </div>
            <div>
                <label class="block font-label-caps text-label-caps text-tertiary uppercase mb-2">Limite de Consumo Diário (kWh)</label>
                <input type="number" name="limite_consumo_kwh" step="10" min="0" value="{{ setor.limite_consumo_kwh if editando else '500' }}" placeholder="500"
                    class="w-full px-4 py-2 bg-surface-container-lowest border border-outline-variant rounded font-numeric-data focus:border-primary-container focus:ring-1 focus:ring-primary-container focus:outline-none"/>
            </div>
        </div>
        <div class="flex gap-3 mt-8">
            <button type="submit" class="px-6 py-2 bg-primary-container text-on-primary-container font-numeric-data text-numeric-data rounded hover:bg-primary transition-colors flex items-center gap-2">
                <span class="material-symbols-outlined text-[18px]">save</span> {{ 'Atualizar' if editando else 'Cadastrar' }}
            </button>
            <a href="{{ url_for('setores.listar') }}" class="px-6 py-2 border border-outline-variant text-on-surface font-numeric-data text-numeric-data rounded hover:bg-surface-variant transition-colors">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
